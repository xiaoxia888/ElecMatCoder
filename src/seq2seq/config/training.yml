# ============================================
# Seq2Seq TYPE编码生成模型训练配置
# ============================================

# 数据配置
data:
  train_file: data/seq2seq/type_seq2seq_train.jsonl
  val_file: data/seq2seq/type_seq2seq_val.jsonl     # 可选，不存在则自动划分
  val_split: 0.1                                     # 验证集比例
  max_input_length: 64                               # 输入最大长度
  max_output_length: 16                              # 输出最大长度（编码通常很短）

# 模型配置
model:
  # 可选模型：
  #   - google/mt5-small (300M, 推荐快速验证)
  #   - google/mt5-base (580M, 效果更好)
  #   - Langboat/mengzi-t5-base (中文优化)
  #   - models/seq2seq (本地已训练模型)
  pretrained_model: models/seq2seq  # 使用本地模型，避免网络下载
  output_dir: outputs/type_seq2seq

# 训练参数
training:
  epochs: 20
  batch_size: 16
  learning_rate: 3e-4                # T5 通常用较大学习率
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_grad_norm: 1.0
  
  # 早停配置
  early_stopping:
    patience: 5                       # 验证集性能不提升的轮数
    metric: exact_match               # 监控指标
  
  # 保存配置
  save_strategy: epoch                # 保存策略：epoch / steps
  save_total_limit: 3                 # 最多保存几个checkpoint

# 生成配置
generation:
  num_beams: 4                        # beam search 宽度
  max_length: 16                      # 生成最大长度

# 设备配置
device: auto                          # cuda, mps, cpu, auto

# 随机种子
seed: 42
