# ============================================================
# 材料编码映射配置 (用户手动维护)
# 此文件由用户手动维护，系统不会自动修改
# ============================================================

# 名称编码 (NAME) - 业务定义的标准名称
name:
  桥架: QJ
  槽盒: QJ
  线槽: QJ
  汇线槽: QJ
  弯通: WT
  弯头: WT
  等径三通: DJST
  异径三通: YJST
  等径四通: DJSIT
  异径四通: YJSIT
  水平弯通: SPWT
  垂直弯通: CZWT
  水平三通: SPST

# 材质编码 (MATERIAL)
material:
  铝合金: LHJ
  复合型: FHX
  镀锌钢: DXG
  不锈钢: BXG
  玻璃钢: BLG
  聚氯乙烯: PVC
  PVC: PVC

# 形式/类型编码 (TYPE)
type:
  梯式: TS
  梯级式: TS
  槽式: CS
  槽盒式: CS
  托盘式: TP

# 分类缓存 - 将描述性的小类归并到标准名称
classification_cache:
  name:
    电信桥架: 桥架
    仪表桥架: 桥架
    电力桥架: 桥架
    防火桥架: 桥架
    梯式桥架: 桥架
    大跨距桥架: 桥架
    水平三通: 水平三通
  
  material:
    高分子复合型: 复合型
    304不锈钢: 不锈钢
    316L不锈钢: 不锈钢
    热浸锌: 镀锌钢
  
  type:
    梯形: 梯式
    槽型: 槽式

# 行业知识推断规则
inference_rules:
  name_to_type:
    槽盒: 槽式
    线槽: 槽式
  name_to_material:
    户外桥架: 热镀锌
