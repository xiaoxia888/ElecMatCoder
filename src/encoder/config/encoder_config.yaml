# ============================================================
# 编码规则配置
# ============================================================

# 编码字段顺序（固定）
field_order:
  - TYPE       # 种类
  - RADIUS     # 弯曲半径（规则提取：1D, 1.5D, SR, LR...）
  - SEAL       # 密封面形式（规则提取：FF, RF...）
  - MANU       # 工艺
  - CONN       # 连接/端部结构（SW, BW, THD, BLE/TSE(MNPT)...）
  - SIZE       # 尺寸
  - THICKNESS  # 壁厚
  - PRESSURE   # 磅级
  - MATERIAL   # 材质
  - STANDARD   # 规范

# 需要语义相似度匹配的字段
semantic_match_fields:
  - TYPE
  - MATERIAL

# 仅精确匹配的字段（不存在则跳过，编码为空）
exact_match_fields:
  - MANU
  - CONN
  - SEAL

# 置信度 / 审查 / 一致性验证相关配置已迁移到：
#   src/config/confidence_config.yaml

# 壁厚毫米换算
thickness_mm_conversion:
  enabled: false

# 材质特殊要求补提
# 仅用于编码前后处理：当原文命中别名，且材质 VALUE 未自带后缀时，
# 将对应后缀补入 MATERIAL[*].SPECIAL_REQ
material_special_req_supplement:
  enabled: true
  suffix_aliases:
    ZN:
      - ZN
      - GALVANIZED
      - GALV
      - 镀锌
    CE:
      - NACE
      - CE
      - ANTI-H2S
      - ANTI-HIC

