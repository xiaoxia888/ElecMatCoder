# ============================================================
# TYPE 组合编码：属性包含关系映射
# 用于判断 TYPE 是否已包含某属性的含义，避免重复拼接
# 例如：TYPE='承插焊法兰' 已包含 'SW' 的含义 → 跳过 CONN='SW'
# ============================================================
type_included_keywords:
  # RADIUS 弯曲半径关键词
  1D: ['1d', '短半径', 'short radius']
  1.5D: ['1.5d', '长半径', 'long radius']
  2D: ['2d']
  3D: ['3d']
  SR: ['sr', '短半径', 'short radius', '短弯']
  LR: ['lr', '长半径', 'long radius', '长弯']
  # CONN 连接方式关键词
  SO: ['平焊', 'slip', 'so']
  SW: ['承插', '承插焊', 'sw', '插焊']
  # BW: ['对焊', 'butt', 'bw', 'weld neck']
  THD: ['thread', 'thd', 'npt', 'fnpt', 'mnpt']
  NPT: ['npt', 'fnpt', 'mnpt']
  FNPT: ['fnpt']
  MNPT: ['mnpt']
  # SEAL 密封面关键词
  FF: ['平面', 'flat face', 'ff']
  RF: ['突面', 'raised face', 'rf']
  RTJ: ['环连接', 'ring', 'rtj']
  DOUBLE-LIP: ['double-lip', 'double lip', '双唇']
  # MANU 工艺关键词
  SMLS: ['无缝', 'seamless', 'smls']
  WELD: ['焊接', 'welded', 'weld']

# ============================================================
# 规则提取标签（通过正则提取，不依赖NER标注）
# 定义需要匹配的关键词，编码映射在 pipe_code_mapping.yaml 中
# 提取规则：关键词两侧是空格、分隔符(;,-)或字符串边界，忽略大小写
# ============================================================
regex_extraction:
  # RADIUS 弯曲半径 - 影响弯头类型编码
  # 支持两种格式：keywords（固定关键词）和 patterns（正则模式）
  RADIUS:
    keywords:
      - SR          # Short Radius 短半径
      - LR          # Long Radius 长半径
    patterns:
      - 'R?\s*=?\s*\d+\.?\d*\s*[DdRr]'   # 匹配 1D, 1.5D, R=1D, 3R 等
  
  # SEAL 密封面形式 - 需要匹配的关键词列表
  SEAL:
  # 强边界
    keywords_strict:
      - FF          # Flat Face 平面
      # - RF        # Raised Face 突面（暂不提取）
      - RTJ         # Ring Type Joint 环连接面
      - RJ
      - MFM
      - LM
      - MF
      - FM
      - LF
    keywords_loose:
      - FLRJ        # Flat Ring Joint 平面环连接面
      - DOUBLE-LIP
      - DOUBLE LIP
    no_boundary:
      - 双唇
    aliases:
      DOUBLE-LIP: Double-lip
      DOUBLE LIP: Double-lip
      双唇: Double-lip
  
  # CONN 连接/端部结构 - 基于 pipe_code_mapping.yaml 中已有的关键词
  CONN:
    keywords_strict:
      - THD
    keywords_loose:
      - SO
      - SW
      - FTE         # 通用内螺纹
      - MTE         # 通用外螺纹
      - NPT         # NPT螺纹
      - FNPT        # 内螺纹
      - MNPT        # 外螺纹
      - NPTF        # 干密封内螺纹
      - NPTM        # 外螺纹
      - SCRD
    no_boundary:
      - 插焊
      - 承插
      - 承插焊      # 无边界匹配，可从"国标锻钢制承插焊"中提取
    patterns:
      - 'BLE\s*[/xX]\s*TSE\s*\(MNPT\)'
      - 'BLE\s*[/xX]\s*TSE\s*\(NPT\)'
      - 'BLE\s*[/xX]\s*TSE'
    aliases:
      承插焊: SW
      插焊: SW
      承插: SW
  # MANU 工艺 - 基于 pipe_code_mapping.yaml 中已有的关键词
  MANU:
    keywords_loose:
      - ERW
      - DSAW
      - DSAWL
      - DSAWH
      - SAW
      - SAWL
      - SAWH
      - LSAW
      - EFW
      - HFW
      - SMLS
