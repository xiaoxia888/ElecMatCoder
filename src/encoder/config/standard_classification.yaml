# 标准分类配置文件
# 生产标准 (production) - 材料/产品本身的生产规范
# 制造标准 (manufacturing) - 加工/制造工艺的规范

# 前缀优先级排序 (数字越小优先级越高)
prefix_priority:
  GB: 1
  HG: 2
  SH: 3
  NB: 4
  SY: 5
  ASME: 6
  MSS: 7
  API: 8
  EN: 9
  ISO: 10
  BS: 11
  JB: 12

# 标准代码转换规则 (匹配时会去除空格，忽略大小写)
code_conversion:
  "ASMEB": "AB"
  "MSSSP": "MS"
  "GB/T": "GBT"
  "HG/T": "HGT"
  "SH/T": "SHT"
  "NB/T": "NBT"
  "SY/T": "SYT"
  "JB/T": "JBT"
  "EN ISO": "ENI"
  # 国家采标前缀转换（各国采用欧洲标准时的前缀 → EN）
  "DIN EN": "EN"    # 德国
  "BS EN": "EN"     # 英国
  "NF EN": "EN"     # 法国
  "UNE EN": "EN"    # 西班牙
  "UNI EN": "EN"    # 意大利
  "NEN EN": "EN"    # 荷兰
  "ÖNORM EN": "EN"  # 奥地利
  "SS EN": "EN"     # 瑞典

