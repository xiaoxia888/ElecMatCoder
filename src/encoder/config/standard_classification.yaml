# 标准分类配置文件
# 生产标准 (production) - 材料/产品本身的生产规范
# 制造标准 (manufacturing) - 加工/制造工艺的规范
# 产品标准 (product) - 产品/部件标准
# 建造标准 (construction) - 建造、施工及验收相关标准

# 前缀优先级排序 (数字越小优先级越高)
prefix_priority:
  GB: 1
  HG: 2
  SH: 3
  NB: 4
  SY: 5
  AB: 6
  MS: 7
  API: 8
  EN: 9
  DIN: 10
  ISO: 11
  BS: 12
  JIS: 13
  JB: 14

# 标准代码转换规则 (匹配时会去除空格，忽略大小写)
code_conversion:
  "ASMEB": "AB"
  "ANSIB": "AB"
  "MSSSP": "MS"
  "GB/T": "GBT"
  "HG/T": "HGT"
  "SH/T": "SHT"
  "NB/T": "NBT"
  "SY/T": "SYT"
  "JB/T": "JBT"
  "EN ISO": "ENI"
  # 国家采标前缀转换（各国采用欧洲标准时的前缀 → EN）
  "DIN EN": "EN"    # 德国
  "BS EN": "EN"     # 英国
  "NF EN": "EN"     # 法国
  "UNE EN": "EN"    # 西班牙
  "UNI EN": "EN"    # 意大利
  "NEN EN": "EN"    # 荷兰
  "ÖNORM EN": "EN"  # 奥地利
  "SS EN": "EN"     # 瑞典

